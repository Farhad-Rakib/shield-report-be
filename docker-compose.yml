# LAN demo stack: mssql + mailhog + api (this repo) + fe (shield-report-fe).
#
# Requires shield-report-fe to be cloned as a SIBLING directory next to this repo, e.g.:
#   server/
#     shield-report-be/   <- this repo (contains this file)
#     shield-report-fe/
#
# Usage:
#   cp .env.example .env   # then set SERVER_IP to this machine's LAN IP
#   docker compose up -d --build
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: shieldreport-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - shieldreport-net
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: shieldreport-mailhog
    ports:
      - "8025:8025" # web UI to view password-reset / notification emails sent during the demo
    networks:
      - shieldreport-net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: shieldreport-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__SqlServerConnection: Server=mssql,1433;Database=ShieldReportDb;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      Jwt__Issuer: ShieldReport
      Jwt__Audience: ShieldReport.Client
      Cors__AllowedOrigins__0: http://${SERVER_IP}:${FE_PORT:-8080}
      Smtp__Host: mailhog
      Smtp__Port: 1025
      Smtp__Username: demo
      Smtp__Password: demo
      Smtp__FromAddress: no-reply@shieldreport.local
      Smtp__FromName: Shield Report
      Smtp__UseSsl: "false" # MailHog doesn't speak TLS
      # This demo serves everything over plain HTTP, and browsers refuse to store/send Secure
      # cookies on a non-HTTPS, non-"localhost" origin — without this, refresh-token renewal
      # silently breaks once the LAN IP is used. See RefreshTokenCookie.cs.
      Cookies__RequireSecure: "false"
      Serilog__MinimumLevel__Default: Information
    ports:
      - "${API_PORT:-5050}:8080"
    volumes:
      # Docker-outside-of-Docker: lets DockerScanRunner (ShieldReport.Scanning) shell out to
      # `docker run` for Naabu/Nuclei/Reconftw against the HOST's Docker daemon. The api
      # container runs as root (no USER in src/Dockerfile), so it can access the socket
      # regardless of its host-side group ownership. Not a hard startup dependency on
      # scanner-images below — a broken/unavailable third-party scan-tool image shouldn't
      # block the app itself from coming up; the first scan with that tool just eats a pull.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - shieldreport-net
    restart: unless-stopped

  # Pulls the scan tool images once as part of `docker compose up`/`pull`, so DockerScanRunner's
  # ephemeral `docker run` calls never have to pull on-demand mid-scan or after a redeploy.
  # These aren't long-running services — each just pulls its image and exits immediately.
  scanner-images:
    image: alpine:latest
    container_name: shieldreport-scanner-images
    depends_on:
      naabu-image:
        condition: service_completed_successfully
      nuclei-image:
        condition: service_completed_successfully
      reconftw-image:
        condition: service_completed_successfully
    command: ["true"]
    restart: "no"
    networks:
      - shieldreport-net

  naabu-image:
    image: projectdiscovery/naabu:latest
    container_name: shieldreport-naabu-image
    entrypoint: ["true"]
    restart: "no"
    networks:
      - shieldreport-net

  nuclei-image:
    image: projectdiscovery/nuclei:latest
    container_name: shieldreport-nuclei-image
    entrypoint: ["true"]
    restart: "no"
    networks:
      - shieldreport-net

  # six2dez/reconftw only publishes a linux/arm64 manifest on Docker Hub (verified via
  # `docker manifest inspect six2dez/reconftw:latest` — no linux/amd64 entry exists at all).
  # Pinning the platform here means this pulls natively on arm64 hosts and via QEMU emulation
  # on amd64 hosts, instead of failing outright with "no matching manifest for linux/amd64".
  # DockerScanRunner.cs must pass the same --platform linux/arm64 flag when it invokes this
  # image at scan time, or the runtime `docker run` call hits the identical error.
  reconftw-image:
    image: six2dez/reconftw:latest
    platform: linux/arm64
    container_name: shieldreport-reconftw-image
    entrypoint: ["true"]
    restart: "no"
    networks:
      - shieldreport-net

  fe:
    build:
      context: ../shield-report-fe
      dockerfile: Dockerfile
    container_name: shieldreport-fe
    depends_on:
      - api
    environment:
      # Baked into a static file at container startup (see shield-report-fe/docker/entrypoint.sh),
      # so this image never needs to be rebuilt just because SERVER_IP changes.
      API_BASE_URL: http://${SERVER_IP}:${API_PORT:-5050}/api/v1
      CSP_CONNECT_SRC: http://${SERVER_IP}:${API_PORT:-5050} ws://${SERVER_IP}:${API_PORT:-5050}
    ports:
      - "${FE_PORT:-8080}:80"
    networks:
      - shieldreport-net
    restart: unless-stopped

networks:
  shieldreport-net:
    driver: bridge

volumes:
  mssql_data:
